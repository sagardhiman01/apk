name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  build-android:
    runs-on: ubuntu-latest

    env:
      EXPO_PUBLIC_API_URL: https://serve-thorough-wiley-tropical.trycloudflare.com/api

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: 'ramsun-mobile/package-lock.json'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install dependencies
        run: |
          cd ramsun-mobile
          npm install

      - name: Generate Android project (Expo Prebuild)
        run: |
          cd ramsun-mobile
          npx expo prebuild --platform android --clean

      - name: Build APK (Release)
        run: |
          cd ramsun-mobile/android
          ./gradlew assembleRelease

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: ramsun-mobile/android/app/build/outputs/apk/release/app-release.apk
